{% load static tailwind_tags %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROS Web</title>
    {% tailwind_css %}
</head>

<body class="bg-gray-200 font-sans">
    {% include 'RosWebApp/header.html' %}
    
    <div class="font-bold text-center my-12 text-4xl">
        <h1>Robot Collection</h1>
    </div>

    <div class="flex justify-center items-center">
        <div class="grid grid-cols-3 gap-12">

            <!-- Loop through each robot in the context -->
            {% for robot in robots %}
                <div>
                    <button>
                        <div class="bg-white rounded-lg shadow-md p-6 w-96 flex flex-col items-center" id="robotDetailsCard">
                            <div>
                                <!-- Use the robot_icon field to display the image -->
                                <img src="{{ robot.robot_icon.url }}" alt="robot-img" class="rounded-full h-24 w-24"/>
                            </div>
                            <div class="mt-4">
                                <span class="font-semibold">Name:</span> {{ robot.robot_name }}
                            </div>
                            <div class="mt-2">
                                <span class="font-semibold">Type:</span> {{ robot.robot_type }}
                            </div>
                        </div>
                    </button>
                </div>
            {% endfor %}

        </div>
    </div>

    <script>
        // Get the button element
        var buttonElement = document.getElementById('robotDetailsCard');
    
        // Add a click event listener to the button
        buttonElement.addEventListener('click', function() {
            // Redirect to the new page
            window.location.href = '/tb3/';
        });
    </script>
</body>
</html>
